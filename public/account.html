<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NLS | Cuenta</title>
  <link rel="stylesheet" href="styles.css">
</head>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://yzcxlpxbgwgxtigexghm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6Y3hscHhiZ3dneHRpZ2V4Z2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjU1MDIsImV4cCI6MjA5ODM0MTUwMn0.PiFdv0KNXNRyFxPeboBF4-1gc88OjdiHxk9F65RR2qA"
);

async function login() {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/account.html"
    }
  });
}

async function logout() {
  await supabase.auth.signOut();
  window.location.href = "/";
}

// Header auth button (igual que en el resto de páginas)
async function checkUserHeader() {
  const btn = document.getElementById("auth-button");
  const { data } = await supabase.auth.getUser();

  if (data.user) {
    btn.textContent = "Cuenta";
    btn.href = "/account.html";
    btn.onclick = null;
  } else {
    btn.textContent = "Iniciar sesión";
    btn.onclick = (e) => {
      e.preventDefault();
      login();
    };
  }
}

// Contenido de la página de cuenta
async function loadAccountContent() {
  const loading = document.getElementById("account-loading");
  const loggedOut = document.getElementById("account-logged-out");
  const loggedIn = document.getElementById("account-logged-in");

  const { data } = await supabase.auth.getUser();

  loading.style.display = "none";

  if (data.user) {
    loggedIn.style.display = "block";

    const user = data.user;
    document.getElementById("account-email").textContent = user.email || "—";
    document.getElementById("account-name").textContent =
      user.user_metadata?.full_name || user.user_metadata?.name || "—";

    const avatarUrl = user.user_metadata?.avatar_url;
    if (avatarUrl) {
      document.getElementById("account-avatar").src = avatarUrl;
      document.getElementById("account-avatar").style.display = "block";
    }

    document.getElementById("logout-btn").onclick = (e) => {
      e.preventDefault();
      logout();
    };
  } else {
    loggedOut.style.display = "block";

    document.getElementById("login-btn").onclick = (e) => {
      e.preventDefault();
      login();
    };
  }
}

checkUserHeader();
loadAccountContent();

supabase.auth.onAuthStateChange(() => {
  checkUserHeader();
  loadAccountContent();
});
</script>

<body>

<!-- HEADER GLOBAL -->
<header class="header">
  <div class="container nav">
    <a href="/" class="logo">
      <img src="logo.png" alt="NLS" style="height:28px;">
      <span class="product">Private Cloud</span>
    </a>
    <nav>
      <a href="/">NLS</a>
      <a href="/cloud.html">Private Cloud</a>
      <a href="/support.html">Soporte</a>
      <a href="#" id="auth-button" style="margin-left: 20px;">
        Iniciar sesión
      </a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1>Cuenta</h1>
    <p>Gestiona tu sesión y consulta tus datos de acceso.</p>
  </div>
</section>

<!-- ACCOUNT CONTENT -->
<section class="section">
  <div class="container" style="max-width: 600px;">

    <p id="account-loading" style="color: var(--muted);">Cargando...</p>

    <!-- LOGGED OUT STATE -->
    <div id="account-logged-out" style="display:none;">
      <div class="card">
        <h2>No has iniciado sesión</h2>
        <p>Inicia sesión con tu cuenta de Google para acceder a tu información y gestionar tus servicios.</p>
        <button class="btn" id="login-btn" style="width:auto; padding: 12px 24px;">
          Iniciar sesión con Google
        </button>
      </div>
    </div>

    <!-- LOGGED IN STATE -->
    <div id="account-logged-in" style="display:none;">
      <div class="card" style="display:flex; flex-direction:column; gap:14px;">

        <img id="account-avatar" alt="Avatar" style="display:none; width:64px; height:64px; border-radius:50%; border:1px solid var(--border);">

        <div>
          <p style="margin:0; color: var(--muted); font-size:14px;">Nombre</p>
          <p id="account-name" style="margin:4px 0 0 0; font-size:18px; font-weight:600;">—</p>
        </div>

        <div>
          <p style="margin:0; color: var(--muted); font-size:14px;">Correo electrónico</p>
          <p id="account-email" style="margin:4px 0 0 0; font-size:18px; font-weight:600;">—</p>
        </div>

        <button class="btn" id="logout-btn" style="width:auto; padding: 12px 24px; background:#dc2626;">
          Cerrar sesión
        </button>
      </div>
    </div>

  </div>
</section>

</body>
</html>
